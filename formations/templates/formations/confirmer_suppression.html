{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h1>Supprimer la formation</h1>
    <p>Voulez-vous vraiment supprimer la formation <strong>{{ formation.titre }}</strong> ?</p>

    <div class="actions-row">
        <form method="post" class="inline-form">
            {% csrf_token %}
            <button type="submit">Oui, supprimer</button>
        </form>

        <a href="{% url 'dashboard_admin' %}" class="button-link">Annuler</a>
    </div>
</div>

{% endblock %}
