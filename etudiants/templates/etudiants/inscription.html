{% extends 'base.html' %}

{% block content %}

<div class="card">
    <h2>Inscription Etudiant</h2>
    <p>Creez votre compte pour consulter les formations et vous y inscrire facilement.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Creer mon compte</button>
    </form>

    <p>
        Vous avez deja un compte ?
        <a href="{% url 'login' %}">Se connecter</a>
    </p>
</div>

{% endblock %}
